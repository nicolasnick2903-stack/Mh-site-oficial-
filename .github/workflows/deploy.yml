name: Deploy Frontend — MH Facilities

on:
  push:
    branches:
      - main
    paths:
      - "mh-facilities/frontend/**"

  workflow_dispatch:

jobs:
  deploy:
    name: Firebase Hosting Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy para Firebase Hosting
        run: firebase deploy --only hosting:site-oficial --token "$FIREBASE_TOKEN" --project mh-funcionario
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
